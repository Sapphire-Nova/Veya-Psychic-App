<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Luna Bloom Tarot Readings</title>
<style>
body { font-family: Arial, sans-serif; background: #f9f5ff; color: #333; margin: 0; padding: 40px; text-align: center; }
h1 { color: #6b3fa0; font-size: 2em; margin-bottom: 20px; }
p { font-size: 1.2em; margin-bottom: 30px; }
.button { display:inline-block; padding:16px 32px; background:#6b3fa0; color:#fff; border-radius:8px; text-decoration:none; font-weight:bold; font-size:1.1em; cursor:pointer; }
.footer { font-size: 1em; color: #555; margin-top: 20px; }
.footer a { color: #6b3fa0; text-decoration: none; font-weight: bold; }
.modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; }
.modal-content { background:#fff; padding:30px; border-radius:12px; max-width:600px; width:90%; text-align:center; box-shadow:0 0 20px rgba(0,0,0,0.3);}
.modal-content p { margin-bottom: 20px; font-size:1.1em; }
</style>
<script>
function openBookingPopup() {
    window.open('https://outlook.office.com/book/LunaBloomTarotReadings@lunabloomtarot.net/?ismsaljsauthenabled', 'Booking', 'width=900,height=700,resizable=yes,scrollbars=yes');
}
function closeModal() {
    document.getElementById('modal').style.display='none';
}
</script>
</head>
<body>
<h1>Schedule Your Tarot Reading</h1>
<p>If you’re not available for instant chat, click below to book a reading!</p>

<div id='modal' class='modal-overlay'>
  <div class='modal-content'>
    <p>Click below to schedule your reading:</p>
    <div class='button' onclick='openBookingPopup()'>Book a Reading</div>
    <p class='footer'><a href='#' onclick='closeModal()'>Close</a> | Available for instant readings? <a href='https://your-instant-chat-link.com' target='_blank'>Chat now!</a></p>
  </div>
</div>

</body>
</html>
