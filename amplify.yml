version: 1

backend:
  phases:
    build:
      commands:
        - npm ci --legacy-peer-deps
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --yes

frontend:
  phases:
    preBuild:
      commands:
        - npm ci --legacy-peer-deps
        # Keep outputs generation OFF until things are stable:
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
    build:
      commands:
        - npm run build

  artifacts:
    baseDirectory: dist
    files:
      - '**/*'

  cache:
    paths:
      - node_modules/**/*

